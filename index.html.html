<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roxtorca Sync</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold">Roxtorca <span class="text-blue-300">Sync</span></h1>
            <p id="conn-status" class="text-[10px] opacity-80 uppercase font-bold tracking-widest">
                <span class="w-2 h-2 bg-red-500 rounded-full inline-block mr-1"></span> Desconectado
            </p>
        </div>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="w-10 h-10 bg-blue-800 rounded-full flex items-center justify-center active:scale-90 transition-transform">
            <i class="fas fa-cog"></i>
        </button>
    </header>

    <main class="p-4 space-y-4 flex-grow mb-24">
        
        <div id="config" class="hidden bg-white p-5 rounded-3xl shadow-xl border border-blue-100 space-y-4">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest">Configuración Supabase</h2>
            <input type="text" id="url" placeholder="URL de tu proyecto" class="w-full p-3 bg-gray-50 rounded-2xl text-sm border-0 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="key" placeholder="Tu Anon Key" class="w-full p-3 bg-gray-50 rounded-2xl text-sm border-0 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="save()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-transform">GUARDAR Y CONECTAR</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-3xl shadow-sm border-l-4 border-green-500">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Ingresos hoy</p>
                <p id="tIn" class="text-xl font-black text-green-600 leading-tight">Bs. 0,00</p>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border-l-4 border-red-500">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Egresos hoy</p>
                <p id="tOut" class="text-xl font-black text-red-600 leading-tight">Bs. 0,00</p>
            </div>
        </div>

        <div class="flex justify-between items-center px-1">
            <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Movimientos recientes</h3>
        </div>
        <div id="lista" class="space-y-3">
            <div class="text-center py-20 text-gray-300 italic text-sm">Configura las llaves para ver datos...</div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-morphism safe-area-bottom z-50 p-4 flex justify-around items-center">
        <button onclick="fetchData()" class="text-blue-600 flex flex-col items-center active:scale-90 transition-transform">
            <i class="fas fa-sync-alt text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Refrescar</span>
        </button>
        
        <button onclick="downloadCSV()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 -mt-10 active:scale-90 transition-transform">
            <i class="fas fa-file-csv text-2xl"></i>
        </button>

        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-arrow-up text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Subir</span>
        </button>
    </nav>

    <script>
        let sb = null; 
        let logs = [];

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {
                    console.log("Modo local: Service Worker no necesario");
                });
            });
        }

        window.onload = () => {
            const u = localStorage.getItem('roxtorca_u'); 
            const k = localStorage.getItem('roxtorca_k');
            if(u && k) {
                document.getElementById('url').value = u;
                document.getElementById('key').value = k;
                init(u, k);
            } else {
                document.getElementById('config').classList.remove('hidden');
            }
        };

        function save() {
            const u = document.getElementById('url').value;
            const k = document.getElementById('key').value;
            localStorage.setItem('roxtorca_u', u);
            localStorage.setItem('roxtorca_k', k);
            location.reload();
        }

        async function init(u, k) {
            try {
                sb = supabase.createClient(u, k);
                document.getElementById('conn-status').innerHTML = '<span class="w-2 h-2 bg-green-500 rounded-full inline-block mr-1"></span> Conectado';
                fetchData();
                
                // Escucha en tiempo real
                sb.channel('cambios').on('postgres_changes', { event: '*', schema: 'public', table: 'pagos_moviles' }, () => fetchData()).subscribe();
            } catch (e) {
                alert("Error de conexión. Revisa las llaves.");
            }
        }

        async function fetchData() {
            if(!sb) return;
            const { data, error } = await sb.from('pagos_moviles').select('*').order('created_at', { ascending: false }).limit(30);
            if(data) { logs = data; render(); }
        }

        function render() {
            const c = document.getElementById('lista'); 
            c.innerHTML = '';
            let inB = 0; let outB = 0;

            if(logs.length === 0) {
                c.innerHTML = '<div class="text-center py-10 text-gray-400 text-xs">No hay pagos registrados aún.</div>';
                return;
            }

            logs.forEach(p => {
                const isIn = p.tipo_movimiento === 'ingreso';
                if(isIn) inB += parseFloat(p.monto || 0); else outB += parseFloat(p.monto || 0);

                c.innerHTML += `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center ${isIn ? 'border-l-4 border-l-green-500' : 'border-l-4 border-l-red-500'}">
                    <div class="space-y-1">
                        <div class="text-[10px] font-black text-gray-800 uppercase tracking-tighter">${p.banco || 'BANCO'}</div>
                        <div class="text-xs font-mono text-blue-800 font-bold">Ref: ${p.referencia || 'S/R'}</div>
                        <div class="text-[9px] text-gray-400 font-bold uppercase">${new Date(p.created_at).toLocaleString()}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-black ${isIn ? 'text-green-600' : 'text-red-600'}">Bs. ${parseFloat(p.monto || 0).toLocaleString('de-DE', {minimumFractionDigits:2})}</div>
                        <div class="inline-block px-2 py-0.5 rounded-full text-[8px] font-bold mt-1 ${p.procesado_erp ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'}">
                            ${p.procesado_erp ? 'ERP OK' : 'PENDIENTE'}
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('tIn').innerText = 'Bs. ' + inB.toLocaleString('de-DE', {minimumFractionDigits:2});
            document.getElementById('tOut').innerText = 'Bs. ' + outB.toLocaleString('de-DE', {minimumFractionDigits:2});
        }

        function downloadCSV() {
            if(logs.length === 0) return;
            let csv = "Fecha;Banco;Referencia;Monto;Tipo;Estado\n";
            logs.forEach(p => {
                csv += `${new Date(p.created_at).toLocaleString()};${p.banco};${p.referencia};${p.monto};${p.tipo_movimiento};${p.procesado_erp?'OK':'PEND'}\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Reporte_Pagos_Roxtorca.csv';
            a.click();
        }
    </script>
</body>
</html>
